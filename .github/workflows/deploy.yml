name: Deploy

on:
  push:
    branches:
      - main
    paths:
      - 'server/**'
      - 'hirematch/**'

jobs:
  deploy-backend:
    runs-on: ubuntu-latest
    if: contains(github.event.commits[0].modified, 'server/')
    steps:
      - name: Trigger Dokploy backend deploy
        run: |
          curl -s -o /dev/null -w "%{http_code}" \
            -X POST "${{ secrets.DOKPLOY_WEBHOOK_BACKEND }}"

  deploy-frontend:
    runs-on: ubuntu-latest
    if: contains(github.event.commits[0].modified, 'hirematch/')
    steps:
      - name: Trigger Dokploy frontend deploy
        run: |
          curl -s -o /dev/null -w "%{http_code}" \
            -X POST "${{ secrets.DOKPLOY_WEBHOOK_FRONTEND }}"
