name: Deploy

on:
  push:
    branches:
      - main
    paths:
      - 'server/**'
      - 'hirematch/**'

jobs:
  deploy-backend:
    runs-on: ubuntu-latest
    steps:
      - name: Trigger Dokploy backend deploy
        run: |
          curl -s -o /dev/null -w "%{http_code}" \
            -X POST "${{ secrets.DOKPLOY_WEBHOOK_BACKEND }}"

  deploy-frontend:
    runs-on: ubuntu-latest
    steps:
      - name: Trigger Dokploy hirematch-api deploy
        env:
          DOKPLOY_API_KEY: ${{ secrets.DOKPLOY_API_KEY }}
        run: |
          curl -s -f -X POST \
            -H "x-api-key: $DOKPLOY_API_KEY" \
            -H "Content-Type: application/json" \
            -d '{"json":{"composeId":"H-3aI58pTbMYdsfSnmvcW"}}' \
            "${{ secrets.DOKPLOY_WEBHOOK_FRONTEND }}"
